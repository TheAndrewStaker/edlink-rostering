services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: edlink_poc
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "${PORT_POSTGRES:-5434}:5432"
    volumes:
      - edlink_rostering_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d edlink_poc"]
      interval: 2s
      timeout: 2s
      retries: 10

volumes:
  edlink_rostering_pgdata:
